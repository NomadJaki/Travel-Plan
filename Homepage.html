<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Plan</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f5f5;
        }
        h1 {
            margin-top: 50px;
        }
        .container {
            margin-top: 40px;
        }
        button {
            padding: 15px 30px;
            margin: 20px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #007BFF;
            color: white;
        }
        button:hover {
            background-color: #0056b3;
        }
        .page {
            display: none;
        }
        .active {
            display: block;
        }
        a {
            color: #007BFF;
        }
    </style>
</head>
<body>

    <h1>Travel Plan</h1>

    <!-- Home Page -->
    <div id="home" class="page active">
        <div class="container">
            <button onclick="showPage('june1')">June 1 Itinerary</button>
            <button onclick="showPage('june6')">June 6 Itinerary</button>
        </div>
    </div>

    <!-- June 1 Page -->
    <div id="june1" class="page">
        <h2>June 1 Itinerary</h2>
        <p><strong>Starting Point:</strong> King's Cross Station</p>
        <p>
            <a href="https://maps.app.goo.gl/jerauCSENDF51cdM6" target="_blank">
                View on Google Maps
            </a>
        </p>

        <p>→ Next Stop: Big Ben</p>
        <p>
            <a href="https://maps.app.goo.gl/CmNCxu9E8XDYN4Kr5" target="_blank">
                View on Google Maps
            </a>
        </p>

        <p>→ Final Stop: London Eye</p>
        <p>
            <a href="https://maps.app.goo.gl/wLY1695DLC3TEkgW8" target="_blank">
                View on Google Maps
            </a>
        </p>

        <br>
        <button onclick="showPage('home')">Back</button>
    </div>

    <!-- June 6 Page -->
    <div id="june6" class="page">
        <h2>June 6 Itinerary</h2>
        <p>Details coming soon...</p>
        <br>
        <button onclick="showPage('home')">Back</button>
    </div>

    <script>
        function showPage(pageId) {
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
    </script>

</body>
</html>
